<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Butterfly POS</title>

<link rel="stylesheet" href="../css/theme.css">

<link rel="stylesheet" href="../css/buttons.css">
<link rel="stylesheet" href="../css/forms.css">
<link rel="stylesheet" href="../css/modals.css">
<link rel="stylesheet" href="../css/tables.css">
<link rel="stylesheet" href="../css/cards.css">
<link rel="stylesheet" href="../css/utilities.css">

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="css/productos.css">
<link rel="stylesheet" href="../css/usuarios.css">
<link rel="stylesheet" href="../css/salon.css">
<link rel="stylesheet" href="../css/carta.css">
<link rel="stylesheet" href="../css/carta.css">
    

</head>

<body>

<div class="contenedor">

    <aside class="sidebar">

        <div class="logo">

            <img src="../img/logo.png" alt="Logo">

            <h2>Butterfly POS</h2>

        </div>

        <nav id="menu">

        </nav>

    </aside>

    <main class="principal">

        <header>

<div class="titulo">

    Butterfly POS

</div>

            <div class="usuario">

                <img src="../img/user.png" alt="Usuario">

                <div>

                    <strong id="nombreUsuario"></strong>

                    <br>

                    <span id="tipoUsuario"></span>

                </div>

                <button id="cerrarSesion">

                    Salir

                </button>

            </div>

        </header>

        <section id="contenido">

            <img src="../img/logo.png" class="logoCentral" alt="Logo">

            <h1>Bienvenido a Butterfly POS</h1>

            <p>

                Seleccione una opción del menú.

            </p>

        </section>

    </main>

</div>

<script type="module">

const usuario = sessionStorage.getItem("usuario");

if(!usuario){

    window.location.href="../index.html";

}

const datos = JSON.parse(usuario);

document.getElementById("nombreUsuario").textContent =
    datos.nombre + " " + datos.apellido;

document.getElementById("tipoUsuario").textContent =
    datos.perfil;

    window.dispatchEvent(new Event("usuarioCargado"));

document.getElementById("cerrarSesion").addEventListener("click",()=>{

    sessionStorage.clear();

    window.location.href="../index.html";

});

</script>

<script src="../js/router.js"></script>

</body>

</html>
