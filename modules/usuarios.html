<div class="usuarios">

    <div class="usuarios-header">

        <h1>Usuarios</h1>

        <button id="nuevoUsuario">
            + Nuevo Usuario
        </button>

    </div>

    <hr>

    <div id="listaUsuarios">

        Cargando usuarios...

    </div>

</div>

<div id="modalUsuario" class="modal oculto">

    <div class="modal-contenido">

        <h2>Nuevo Usuario</h2>

        <div class="campo">

            <label>Nombre</label>
            <input type="text" id="nombre">

        </div>

        <div class="campo">

            <label>Apellido</label>
            <input type="text" id="apellido">

        </div>

        <div class="campo">

            <label>DNI</label>
            <input type="text" id="dni">

        </div>

        <div class="campo">

            <label>Usuario</label>
            <input type="text" id="usuarioNuevo">

        </div>

        <div class="campo">

            <label>Email</label>
            <input type="email" id="email">

        </div>

        <div class="campo">

            <label>Contraseña</label>
            <input type="password" id="passwordNuevo">

        </div>

        <div class="campo">

            <label>Perfil</label>

            <select id="perfilNuevo">

                <option value="salon">Salón</option>
                <option value="cocina">Cocina</option>

            </select>

        </div>

        <div class="botones">

            <button id="crearUsuario">

                Crear Usuario

            </button>

            <button id="cancelarUsuario">

                Cancelar

            </button>

        </div>

    </div>

</div>
