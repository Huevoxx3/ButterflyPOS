<div class="usuarios">

    <div class="usuarios-header">

        <h1>Gestión de Usuarios</h1>

        <div>

            <input
                type="text"
                id="buscarUsuario"
                placeholder="Buscar usuario..."
            >

            <button id="nuevoUsuario">

                + Nuevo Empleado

            </button>

        </div>

    </div>

    <hr>

    <div id="listaUsuarios"></div>

</div>

<div id="modalUsuario" class="modal oculto">

    <div class="modal-contenido">

        <h2 id="tituloModal">Nuevo Empleado</h2>

        <div class="campo">

            <label>Nombre *</label>

            <input type="text" id="nombre">

        </div>

        <div class="campo">

            <label>Apellido *</label>

            <input type="text" id="apellido">

        </div>

        <div class="campo">

            <label>DNI *</label>

            <input type="text" id="dni">

        </div>

        <div class="campo">

            <label>Contraseña Temporal *</label>

            <input type="password" id="passwordNuevo">

        </div>

        <div class="campo">

            <label>Perfil</label>

            <select id="perfilNuevo">

                <option value="salon">Salón</option>

                <option value="cocina">Cocina</option>

            </select>

        </div>

        <div class="botones">

            <button id="crearUsuario">

                Crear Empleado

            </button>

            <button id="cancelarUsuario">

                Cancelar

            </button>

        </div>

    </div>

</div>
