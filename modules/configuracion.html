<div class="cardPrimerIngreso">

    <h1>Mi Perfil</h1>

    <p class="textoPrimerIngreso">

        Actualice su información personal.

    </p>

    <div class="campo">

        <label>Nombre</label>

        <input id="cfgNombre" disabled>

    </div>

    <div class="campo">

        <label>Apellido</label>

        <input id="cfgApellido" disabled>

    </div>

    <div class="campo">

        <label>DNI</label>

        <input id="cfgDni" disabled>

    </div>

    <hr><br>

    <div class="campo">

        <label>Usuario</label>

        <input id="cfgUsuario">

    </div>

    <div class="campo">

        <label>Email</label>

        <input id="cfgEmail">

    </div>

    <div class="campo">

        <label>Teléfono</label>

        <input id="cfgTelefono">

    </div>

    <hr><br>

    <h2>Cambiar contraseña</h2>

    <div class="campo">

        <label>Contraseña actual</label>

        <input
            type="password"
            id="cfgActual">

    </div>

    <div class="campo">

        <label>Nueva contraseña</label>

        <input
            type="password"
            id="cfgNueva">

    </div>

    <div class="campo">

        <label>Repetir contraseña</label>

        <input
            type="password"
            id="cfgRepetir">

    </div>

    <button
        id="guardarConfiguracion"
        class="btnPrincipal btnGuardarPerfil">

        Guardar Cambios

    </button>

</div>
