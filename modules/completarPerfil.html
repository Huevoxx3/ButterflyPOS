<div class="cardPrimerIngreso">

    <img src="../img/logo.png" class="logoPrimerIngreso">

    <h1>¡Bienvenido a Butterfly POS!</h1>

    <p class="textoPrimerIngreso">
        Es tu primer ingreso al sistema.<br>
        Antes de comenzar, complete la siguiente información.
    </p>

    <div class="campo">

        <label>👤 Usuario</label>

        <input id="perfilUsuario" type="text">

    </div>

    <div class="campo">

        <label>📧 Email</label>

        <input id="perfilEmail" type="email">

    </div>

    <div class="campo">

        <label>📱 Teléfono</label>

        <input id="perfilTelefono" type="text">

    </div>

    <div class="campo">

        <label>🔒 Nueva Contraseña</label>

        <input id="perfilPassword" type="password">

    </div>

    <div class="campo">

        <label>🔒 Repetir Contraseña</label>

        <input id="perfilPassword2" type="password">

    </div>

    <button id="guardarPerfil" class="btnPrincipal btnGuardarPerfil">

        Guardar y Continuar

    </button>

</div>
